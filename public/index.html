<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App – AWS Demo</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; 
           margin: 60px auto; padding: 20px; }
    h1 { color: #FF9900; }
    .badge { background: #232F3E; color: white; 
             padding: 4px 10px; border-radius: 20px; font-size: 13px; }
    li { font-size: 18px; margin: 10px 0; }
    .footer { color: gray; margin-top: 40px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>☁️ Todo App</h1>
  <p>
    <span class="badge">AWS Amplify</span> &nbsp;
    <span class="badge">AWS AppSync</span>
  </p>
  <ul>
    <li>✅ Buy groceries</li>
    <li>✅ Finish cloud project</li>
    <li>⬜ Submit presentation</li>
  </ul>
  <p class="footer">
    Hosted on AWS CDN &nbsp;|&nbsp; CI/CD via Git &nbsp;|&nbsp; 
    Real-time via AppSync GraphQL
  </p>
</body>
</html>
